# Swarm — flat peer pack.
#
# City agents (mayor, deacon) provide the core orchestration surface.
# Mechanical housekeeping (gate/orphan/wisp sweeps, nudge relays) comes from
# the builtin core pack included in city.toml.
# Rig agents replace polecat/refinery/witness with a simpler combo: N coders
# self-organize via beads and mail, a dedicated committer handles git.
# No worktree isolation, no formulas, no witness — peers coordinate directly.
#
# Referenced by both workspace.pack and rigs[].pack:
#   workspace.pack → expands city-scoped agents only (mayor, deacon)
#   rigs[].pack    → expands rig agents only (coder, committer)

[pack]
name = "swarm"
schema = 2

[[named_session]]
template = "mayor"
scope = "city"
mode = "on_demand"

[[named_session]]
template = "deacon"
scope = "city"
mode = "always"

[[named_session]]
template = "committer"
scope = "rig"
mode = "on_demand"
